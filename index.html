<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>NJH Reel Player</title><style>
 body{margin:0;background:#efe7da;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
 .wrap{max-width:780px;margin:24px auto;padding:0 18px}
 .njh{--brand:#e0721f;--ink:#2c2118;--muted:#8a7a68;--line:#e6dccb;--card:#fbf7ef;
   display:grid;grid-template-columns:1fr auto;gap:18px;align-items:stretch;color:var(--ink)}
 @media(max-width:580px){.njh{grid-template-columns:1fr}}
 .master{background:var(--card);border:2px solid #cbbda4;border-radius:14px;overflow:hidden;box-shadow:0 8px 26px rgba(60,40,20,.10)}
 .m-hd{display:flex;align-items:center;gap:10px;padding:11px 15px;background:#14100b}
 .m-hd img{height:26px}.m-hd .who{color:#f3ead9;font-size:12px;font-weight:700}
 .m-cat{display:flex;align-items:center;gap:8px;padding:11px 15px 8px;border-bottom:1px solid var(--line);position:relative}
 .m-cat .cn{flex:1 1 auto;font-size:17px;font-weight:800}
 .menu{width:26px;height:26px;border:0;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px}
 .menu:hover{background:#f1e8d8;color:var(--brand)}.menu svg{width:19px;height:19px}
 .dd{position:absolute;top:42px;right:12px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.15);z-index:5;overflow:hidden;display:none;min-width:150px}
 .dd.show{display:block}
 .dd button{display:block;width:100%;text-align:left;background:none;border:0;padding:10px 14px;font-size:13.5px;cursor:pointer;color:var(--ink)}
 .dd button:hover{background:#f6efe2}.dd button.on{color:var(--brand);font-weight:700}
 .m-tr{display:flex;align-items:center;gap:12px;padding:6px 15px 4px;justify-content:center}
 .big{width:40px;height:40px;border-radius:50%;background:var(--brand);color:#fff;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center}.big svg{width:20px;height:20px}
 .nav{width:30px;height:30px;border:1.5px solid #e0d6c4;border-radius:50%;background:#fff;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center}
 .nav:hover{border-color:var(--brand);color:var(--brand)}.nav svg{width:16px;height:16px}
 .m-seek{display:flex;align-items:center;gap:9px;padding:2px 16px 9px}
 .seek{flex:1 1 auto;height:5px;background:#eaddc9;border-radius:20px;position:relative;cursor:pointer}
 .fill{position:absolute;top:0;left:0;height:100%;width:0;background:var(--brand);border-radius:20px}
 .tick{position:absolute;top:-2px;width:2px;height:9px;background:#cdbfa8}
 .time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
 .m-list{height:372px;overflow-y:auto;border-top:1px solid var(--line)}
 .m-list::-webkit-scrollbar{width:7px}.m-list::-webkit-scrollbar-thumb{background:#d8c9b2;border-radius:8px}
 .spot{display:flex;align-items:center;gap:10px;padding:9px 15px;cursor:pointer;border-bottom:1px solid #f1eadc}
 .spot:last-child{border-bottom:0}.spot:hover{background:#f6efe2}.spot.active{background:#fbeede}
 .sp{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--brand);color:var(--brand);background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
 .spot.active .sp,.spot:hover .sp{background:var(--brand);color:#fff}.sp svg{width:11px;height:11px}
 .idx{font-size:11px;color:var(--muted);width:14px;text-align:right;flex:0 0 auto}
 .meta{flex:1 1 auto;min-width:0}
 .nm{font-size:15px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .desc{font-size:12.5px;color:#7a6a58;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
 .du{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto}
 .sdl{color:var(--muted);opacity:.65;display:flex;padding:4px;border-radius:6px;flex:0 0 auto}
 .sdl:hover{color:var(--brand);opacity:1;background:#fff}.sdl svg{width:15px;height:15px}
 .cats{display:flex;flex-direction:column;background:var(--card);border:2px solid #cbbda4;border-radius:12px;overflow:hidden;box-shadow:0 6px 20px rgba(60,40,20,.07)}
 .cats-hd{font-size:17px;font-weight:800;color:var(--ink);padding:11px 15px 8px;border-bottom:1px solid var(--line);background:var(--card);display:flex;align-items:center;min-height:26px}
 .cbar{display:flex;align-items:center;gap:9px;padding:8px 18px 8px 14px;background:transparent;border:0;border-bottom:1px solid #f1eadc;cursor:pointer;transition:.12s}
 .cbar:last-child{border-bottom:0}.cbar:hover{background:#f1e8d6}.cbar.on{background:#484e37}
 .cbar .ci{width:23px;height:23px;border-radius:50%;border:1.5px solid var(--brand);color:var(--brand);background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
 .cbar.on .ci{background:var(--brand);border-color:var(--brand);color:#fff}.cbar .ci svg{width:11px;height:11px}
 .cbar .cl{flex:1 1 auto;font-size:14px;font-weight:700;white-space:nowrap;margin-right:6px}.cbar.on .cl{color:#fff}
 .cbar .cc{font-size:11px;color:var(--muted)}.cbar.on .cc{color:#b7a08a}
#cats{display:flex;flex-direction:column;flex:1 1 auto}#cats .cbar{flex:1 1 auto}</style></head><body><div class="wrap"><div class="njh"><div class="master"><div class="m-hd"><img alt="NJH" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQoAAAC0CAIAAADjHvUvAABaCUlEQVR42u1dd5wcZfl/nved2XK3V3KXSyWNkFCSUEIwEEIHgYAUBUSkqCC9iT+KgigICIiCgASUIiCKIqD0GhJCSUjv9S6Xckmu960z7/P7452ZnZmd3du9kjt038+hyWVn9m3P83yfDpAf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf+ZEf2Q7sxcfov2VHen0hiNj1DlF2B0KOF6HrEUp3SI4PEeVvfl+SR698MSIggCD4rzksuSJJYPRftK48eWQ7OIIfISoAAJjzBWRnXimXgzK+UwAMBJbGbAtBTxbsXFfmKXOGJChUFCooKGhvb+8MRxCBISO3pCAig6NjUhwQAKD9M6l/sqSHJZ6cm4iICEhARKQoit/n55wDUSwRj8Xi1rvRvhyyLQvR+Q/m16CxQSR6WRCZ70+KW2NjKLkXqVLW+kDqnZYvIiAgRAQhcpuukuPUsUiBX0ziE8tVQdRBqDCGCEQghAAAZMAQgaF56EnpT4C6MJbJGMY02NWpL2/UP92V2BkWgMAZCOovgUYcQRNw9hjlqonK9k5KEBIiZ8AZMgRE4wiIgMiQeAQkBOpCEAAD0Im1J8SOCNR0iOp2vaqD2hIAwIZWlJ1++kmnnnzcxIljo5F2LaEzRBICgQAECUFEggQJAmTI5JVGGxHYbz45iMkkDTRPgYgQENAYwJAEBAL+QEFBe3u8ZlftxsrNGyurqrZuaWxqNkgN3SAt+XIpDQkIiIyLhfJQGTLG2fJFm9pbw4xhz4kEEYUQQ4aW7jt5dCKuIePIEAGEMEjQYhyO6dkmbHwAjRkLSbuEgkgQKVyJRWIrl2zOiUJyIA8iQIRWDX65Vp85jJ07XvnGENR1iOnAgRmEgMTlYaEXJCbzt4iMMc7UM8ZTQ6f+zpboH9fG23VJIdSPkC9OyHw4jPPBfsZRxAVFdUnvRABIBqMiMOZJBETMuDiMMcYYIgHENVEfFWub6YMabXHVtj/Mfm7+vPmXXHDO5Vd931dUAtF24AyIgASQMN6YPN0sl09uUZJkY5LABCgK8FB7464P534+97MF23bUdIQ7hRCKwoqKAtY9S+44equTZKNJRVEIIREV8ZjW6/uv6yR08hf4gsEAAQlNB7RklSFNMQ1qlftnsjAiEkKQpgvOOSDqCYpG4rmqlpgriZsnQgB4wl78usl8TCFrjYHF9RiaHDC5x+jQeREAGEmRIkhFKvLBuga48fPO6rDgDAT1jwCRM1MZFKhsfBE7uIyOGML2LWE6YEQDjmggKyIyBbqwwUiSIgYAgBiCwqCAM41ocYN4sYqqtcJBQf+UAybe/esbpx42OdHSxjgDEkDkwEQmeWQ8RnKBIfeZIpLQ1cLCjkjsb6/85+0PP25obFJ9Pr9PZYgAIEiQcD9vh3TGbyiJJQUJxrmWEPW7W+p2N7e3R+LRBAH1hR0jGPSVDy7ea9yQ0tKCRFwjUzJg19zC4BgEJAQJEhx5Y0Pbrh2N7a3heCwuKadvyQNAoifSBVQE4I5D/SeMVJoigiMyJulEkgqmBeiY5FZEoBEN8vNdbeLKTzs2tAmFgU5uSNz3IoWM6dimqzA4Zgi7dF91dAlvj5OCaG0v2S4XWVwADYVB3hpBgIghPwvH6E9VuApGFKi8IFjwh4dumX7UVL2lnXE0QZNtjZiT9PD4ByGEEiqq2rLtnoce2VBVFSosVFWVJEw   var db=document.createElement('button'); db.textContent=cat.label;
  db.addEventListener('click',function(){ dd.classList.remove('show'); selectCat(ci,true); });
  dd.appendChild(db);
});
var cbars=cats.querySelectorAll('.cbar'), ddbtns=dd.querySelectorAll('button');
document.getElementById('menu').addEventListener('click',function(e){ e.stopPropagation(); dd.classList.toggle('show'); });
document.addEventListener('click',function(){ dd.classList.remove('show'); });
function renderSpots(ci){ var cat=M[ci];
  if(cat.mode==='reel'){
    mlist.innerHTML=cat.chapters.map(function(c,i){
      var d=c.tags?'<div class="desc">'+esc(c.tags)+'</div>':'';
      return '<div class="spot" data-i="'+i+'"><span class="sp">'+PLAY+'</span><span class="idx">'+(i+1)+'</span>'+
        '<div class="meta"><div class="nm">'+esc(c.name)+'</div>'+d+'</div><span class="du">'+fmt(c.end-c.start)+'</span></div>';}).join('');
  } else {
    mlist.innerHTML=cat.spots.map(function(s,i){
      var tip=(s.vibe||s.casting)?' title="'+esc((s.vibe||'')+(s.casting?(s.vibe?' — ':'')+s.casting:''))+'"':'';
      var desc=s.tags?'<div class="desc">'+esc(s.tags)+'</div>':'';
      return '<div class="spot" data-i="'+i+'"'+tip+'><span class="sp">'+PLAY+'</span><span class="idx">'+(i+1)+'</span>'+
        '<div class="meta"><div class="nm">'+esc(s.name)+'</div>'+desc+'</div>'+
        '<span class="du">'+fmt(s.dur)+'</span>'+
        '<a class="sdl" href="'+s.file+'" download title="Download '+esc(s.name)+'" onclick="event.stopPropagation()">'+DL+'</a></div>';}).join('');
  }
  mlist.querySelectorAll('.spot').forEach(function(r){ var i=+r.dataset.i;
    r.addEventListener('click',function(){ if(i===curSpot){ curEl&&(curEl.paused?curEl.play():curEl.pause()); } else { playSpot(i); } }); });
  seek.querySelectorAll('.tick').forEach(function(t){t.remove();});
  if(cat.mode==='reel'){ cat.chapters.forEach(function(c){ if(c.start>0){ var t=document.createElement('div'); t.className='tick'; t.style.left=(c.start/cat.total*100)+'%'; seek.appendChild(t);} }); }
}
function selectCat(ci,autoplay){
  if(ci!==curCat){ curCat=ci; mode=M[ci].mode; cn.textContent=M[ci].label; renderSpots(ci); buildFullPool(ci); }
  cbars.forEach(function(b,i){ b.classList.toggle('on',i===ci); });
  ddbtns.forEach(function(b,i){ b.classList.toggle('on',i===ci); });
  if(autoplay!==false){ playSpot(0); } else { curSpot=0; curEl=elFor(ci,0); paint(); }
}
function playSpot(i){ curSpot=i; var el=elFor(curCat,i); pauseOthers(el);
  if(mode==='reel'){ el.currentTime=M[curCat].chapters[i].start; }
  else if(el!==curEl){ el.currentTime=0; }
  curEl=el; var p=el.play(); if(p&&p.catch)p.catch(function(){}); paint(); }
big.addEventListener('click',function(){ if(curCat<0)return selectCat(0,true); if(!curEl)return playSpot(0); curEl.paused?curEl.play():curEl.pause(); });
document.getElementById('next').addEventListener('click',function(){ if(curCat<0)return; playSpot(Math.min(curSpot+1,spotsLen(curCat)-1)); });
document.getElementById('prev').addEventListener('click',function(){ if(curCat<0)return; playSpot(Math.max(curSpot-1,0)); });
function onTime(e){ if(e.target!==curEl)return;
  if(mode==='reel'){ var chs=M[curCat].chapters,t=curEl.currentTime,tot=M[curCat].total;
    var idx=curSpot; for(var i=0;i<chs.length;i++){ if(t>=chs[i].start-0.05&&t<chs[i].end-0.02){ idx=i; break; } }
    if(idx!==curSpot){ curSpot=idx; paintActive(); }
    fill.style.width=(t/tot*100)+'%'; timeEl.textContent=fmt(t)+' / '+fmt(tot);
  } else { var d=curEl.duration||M[curCat].spots[curSpot].dur;
    fill.style.width=(curEl.currentTime/d*100)+'%'; timeEl.textContent=fmt(curEl.currentTime)+' / '+fmt(d); } }
function onEnded(e){ if(e.target!==curEl)return; if(mode==='spots'&&curSpot<spotsLen(curCat)-1){ playSpot(curSpot+1); } }
seek.addEventListener('click',function(e){ if(!curEl)return; var r=seek.getBoundingClientRect(); var frac=(e.clientX-r.left)/r.width;
  if(mode==='reel'){ curEl.currentTime=frac*M[curCat].total; } else { curEl.currentTime=frac*(curEl.duration||M[curCat].spots[curSpot].dur); }
  if(curEl.paused){ var p=curEl.play(); if(p&&p.catch)p.catch(function(){}); } });
function paint(){ paintActive(); paintIcons(); }
function paintActive(){ mlist.querySelectorAll('.spot').forEach(function(r,i){ r.classList.toggle('active',i===curSpot); }); }
function paintIcons(){ var playing=curEl&&!curEl.paused; big.innerHTML=playing?PAUSE:PLAY;
  cbars.forEach(function(b,i){ b.querySelector('.ci').innerHTML=(i===curCat&&playing)?PAUSE:PLAY; });
  mlist.querySelectorAll('.spot').forEach(function(r,i){ r.querySelector('.sp').innerHTML=(i===curSpot&&playing)?PAUSE:PLAY; }); }
selectCat(0,false);
M.forEach(function(c,ci){ getEl(ci,0); });
setTimeout(function(){ M.forEach(function(c,ci){ setTimeout(function(){ buildFullPool(ci); }, ci*600); }); }, 1200);
</script></body></html>
